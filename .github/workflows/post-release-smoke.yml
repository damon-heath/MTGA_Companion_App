name: Post-Release Smoke

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to validate (example: v1.1.0)"
        required: true
        type: string

jobs:
  release_smoke:
    runs-on: windows-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve release tag
        id: resolve_tag
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Run post-release smoke validation
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/post_release_smoke.ps1 `
            -ReleaseTag "${{ steps.resolve_tag.outputs.tag }}" `
            -Repo "${{ github.repository }}"

      - name: Upload post-release smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: post-release-smoke-${{ steps.resolve_tag.outputs.tag }}
          path: artifacts/postrelease-ci/${{ steps.resolve_tag.outputs.tag }}/*
          if-no-files-found: error
