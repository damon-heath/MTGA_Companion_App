name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  tests_matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt
            requirements-ci.txt

      - name: Run Unit Tests (ResourceWarning=error)
        run: |
          python -W error::ResourceWarning -m unittest discover -s tests -p "test_*.py" -v

      - name: Matrix Summary
        if: always()
        run: |
          echo "### Quality Gates Test Matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "- runner: ubuntu-latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- python: ${{ matrix.python-version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- result: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"

  tests:
    runs-on: ubuntu-latest
    needs:
      - tests_matrix
    steps:
      - name: Validate matrix result
        run: |
          echo "Matrix result: ${{ needs.tests_matrix.result }}"
          if [ "${{ needs.tests_matrix.result }}" != "success" ]; then
            exit 1
          fi

      - name: Workflow Summary
        run: |
          echo "### Quality Gates Matrix Aggregate" >> "$GITHUB_STEP_SUMMARY"
          echo "- matrix job: tests_matrix" >> "$GITHUB_STEP_SUMMARY"
          echo "- aggregate result: ${{ needs.tests_matrix.result }}" >> "$GITHUB_STEP_SUMMARY"

  release_tag_build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - tests
    runs-on: windows-latest
    env:
      WINDOWS_SIGN_CERT_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_CERT_PFX_BASE64 }}
      WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements-ci.txt

      - name: Install Packaging Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-ci.txt

      - name: Install Inno Setup (Current User)
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "innosetup-installer.exe"
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile $installer
          Start-Process -FilePath $installer -ArgumentList @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART','/CURRENTUSER') -Wait
          $iscc = Join-Path $env:USERPROFILE "AppData\\Local\\Programs\\Inno Setup 6\\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at expected path: $iscc"
          }

      - name: Resolve Release Version
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Release Artifacts
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/package_release.ps1 -Version $env:RELEASE_VERSION -BuildInstaller

      - name: Sign Windows Binaries (Optional)
        if: ${{ env.WINDOWS_SIGN_CERT_PFX_BASE64 != '' && env.WINDOWS_SIGN_CERT_PASSWORD != '' }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes(
            $pfxPath,
            [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT_PFX_BASE64)
          )
          & "scripts/sign_artifacts.ps1" `
            -ArtifactPaths @(
              "dist\\ArenaCompanion\\ArenaCompanion.exe",
              "build\\installer\\dist\\ArenaCompanionSetup.exe"
            ) `
            -PfxPath $pfxPath `
            -PfxPassword $env:WINDOWS_SIGN_CERT_PASSWORD

      - name: Assemble Artifact Bundle
        run: |
          $artifactDir = "artifacts\\release\\$env:RELEASE_VERSION"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          if (Test-Path "dist\\ArenaCompanion-onefolder.zip") {
            Remove-Item -LiteralPath "dist\\ArenaCompanion-onefolder.zip" -Force
          }
          Compress-Archive -Path "dist\\ArenaCompanion\\*" -DestinationPath "dist\\ArenaCompanion-onefolder.zip" -CompressionLevel Optimal

          Copy-Item -LiteralPath "build\\installer\\dist\\ArenaCompanionSetup.exe" -Destination (Join-Path $artifactDir "ArenaCompanionSetup.exe") -Force
          Copy-Item -LiteralPath "dist\\ArenaCompanion-onefolder.zip" -Destination (Join-Path $artifactDir "ArenaCompanion-onefolder.zip") -Force

          $checksums = Join-Path $artifactDir "checksums.txt"
          Get-ChildItem -Path $artifactDir -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
            "{0}  {1}" -f $hash.Hash.ToLower(), $_.Name
          } | Set-Content -LiteralPath $checksums -Encoding utf8

      - name: Verify Checksums
        run: |
          $artifactDir = "artifacts\\release\\$env:RELEASE_VERSION"
          $checksumsPath = Join-Path $artifactDir "checksums.txt"
          $lines = Get-Content -LiteralPath $checksumsPath
          foreach ($line in $lines) {
            if (-not $line.Trim()) { continue }
            if ($line -notmatch '^(?<hash>[A-Fa-f0-9]{64})\s+(?<name>.+)$') {
              throw "Invalid checksum line format: $line"
            }

            $expected = $Matches.hash.ToLower()
            $name = $Matches.name.Trim()
            $path = Join-Path $artifactDir $name
            if (-not (Test-Path $path)) {
              throw "Missing artifact referenced in checksums: $name"
            }

            $actual = (Get-FileHash -Algorithm SHA256 -Path $path).Hash.ToLower()
            if ($expected -ne $actual) {
              throw "Checksum mismatch for $name"
            }
          }
          Write-Host "Checksum verification passed."

      - name: Upload Release Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-tag-build-${{ github.ref_name }}
          path: artifacts/release/${{ env.RELEASE_VERSION }}/*
          if-no-files-found: error
